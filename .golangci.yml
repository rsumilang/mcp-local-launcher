# golangci-lint configuration (v1 format for compatibility with CI)
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.24"
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  govet:
    enable:
      - shadow

issues:
  exclude-rules:
    # Allow _ = ... in test files (intentional ignored errors)
    - path: _test\.go
      linters:
        - errcheck
      source: "^\\s*_ = .*$"
