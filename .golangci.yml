# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  go: "1.24"
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable:
        - shadow
  exclusions:
    rules:
      # Allow _ = ... in test files (intentional ignored errors)
      - path: _test\.go
        linters:
          - errcheck
        source: "^\\s*_ = .*$"
